<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Whisky Stock</title>
<script src="https://www.google.com/search?q=https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
<div id="app" class="max-w-md mx-auto min-h-screen p-4">
<header class="flex justify-between items-center mb-6">
<h1 class="text-xl font-bold text-amber-900">Whisky Stock</h1>
<div id="stats" class="bg-amber-100 px-3 py-1 rounded-full text-sm font-bold">0本</div>
</header>
<div id="whiskyList" class="space-y-3"></div>
<button id="addBtn" class="fixed bottom-8 right-6 w-14 h-14 bg-amber-800 text-white rounded-full shadow-lg text-3xl">+</button>
</div>
<script type="module">
import { initializeApp } from "https://www.google.com/search?q=https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.google.com/search?q=https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.google.com/search?q=https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
const firebaseConfig = {
apiKey: "AIzaSyAk41dGtCDcDGMmvXmknE6MXu_fE_6_R-o",
authDomain: "https://www.google.com/search?q=my-whisky-app.firebaseapp.com",
projectId: "my-whisky-app",
storageBucket: "my-whisky-app.firebasestorage.app",
messagingSenderId: "599572459740",
appId: "1:599572459740:web:9f8e4e7e6f8a4e7e6f8a4e"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
onAuthStateChanged(auth, async (user) => {
if (!user) { await signInAnonymously(auth); return; }
const colRef = collection(db, "users", user.uid, "whiskies");
onSnapshot(colRef, (snapshot) => {
const data = snapshot.docs.map(d => d.data());
document.getElementById('stats').innerText = data.length + "本";
const listEl = document.getElementById('whiskyList');
if (data.length === 0) {
listEl.innerHTML = '<p class="text-center py-10 text-slate-400">ボトルがありません</p>';
} else {
listEl.innerHTML = data.map(w => `
<div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex justify-between items-center">
<div class="font-bold text-slate-800">{w.name}&lt;/div&gt;
&lt;div class=&quot;text-amber-800 font-bold&quot;&gt;{w.remaining}%</div>
</div>`).join('');
}
});
});
document.getElementById('addBtn').onclick = async () => {
const name = prompt("銘柄名を入力してください");
if (name && auth.currentUser) {
await addDoc(collection(db, "users", auth.currentUser.uid, "whiskies"), {
name: name, remaining: 100, createdAt: Date.now()
});
}
};
</script>
</body>
</html>
