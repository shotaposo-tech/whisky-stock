<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>Whisky Stock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
        .gold-text { background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        
        /* 基本のカード設定：全周枠線を追加 */
        .whisky-card { background: #fff; border-radius: 16px; border: 2px solid #e2e8f0; color: #1e293b; user-select: none; transition: all 0.2s; }
        
        /* カテゴリー別の配色（枠線と背景の塗り） */
        .cat-スコッチ { border-color: #3b82f6; background-color: #eff6ff; }
        .cat-スコッチ input[type=range]::-webkit-slider-thumb { background: #3b82f6; }
        
        .cat-ジャパニーズ { border-color: #ef4444; background-color: #fef2f2; }
        .cat-ジャパニーズ input[type=range]::-webkit-slider-thumb { background: #ef4444; }
        
        .cat-アイリッシュ { border-color: #10b981; background-color: #f0fdf4; }
        .cat-アイリッシュ input[type=range]::-webkit-slider-thumb { background: #10b981; }
        
        .cat-アメリカン { border-color: #f59e0b; background-color: #fffbeb; }
        .cat-アメリカン input[type=range]::-webkit-slider-thumb { background: #f59e0b; }
        
        .cat-カナディアン { border-color: #8b5cf6; background-color: #f5f3ff; }
        .cat-カナディアン input[type=range]::-webkit-slider-thumb { background: #8b5cf6; }
        
        .cat-その他 { border-color: #6b7280; background-color: #f9fafb; }
        .cat-その他 input[type=range]::-webkit-slider-thumb { background: #6b7280; }

        .tag { font-size: 10px; padding: 3px 10px; border-radius: 99px; font-weight: bold; background: rgba(255,255,255,0.8); color: #1e293b; border: 1px solid rgba(0,0,0,0.1); }
        
        input[type=range] { -webkit-appearance: none; background: rgba(0,0,0,0.05); height: 8px; border-radius: 4px; width: 100%; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; border: 3px solid white; box-shadow: 0 3px 6px rgba(0,0,0,0.2); }
        
        #catModal { display: none; }
        #catModal.active { display: flex; }
        
        .category-btn { width: 100%; padding: 16px; margin-bottom: 10px; border-radius: 16px; font-weight: bold; font-size: 1.1rem; color: white; transition: all 0.2s; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-スコッチ { background: #3b82f6; }
        .btn-ジャパニーズ { background: #ef4444; }
        .btn-アイリッシュ { background: #10b981; }
        .btn-アメリカン { background: #f59e0b; }
        .btn-カナディアン { background: #8b5cf6; }
        .btn-その他 { background: #6b7280; }
        .category-btn:active { transform: scale(0.94); filter: brightness(1.1); }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 overflow-x-hidden">
    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col relative">
        <header class="bg-black/80 backdrop-blur-md border-b border-amber-900/50 px-6 py-6 sticky top-0 z-20 text-center">
            <h1 class="text-2xl italic gold-text">Whisky Stock</h1>
            <div id="stats" class="absolute right-4 top-7 text-[10px] border border-amber-600 px-2 py-0.5 rounded text-amber-500 font-mono">STOCK: 0</div>
        </header>

        <main id="whiskyList" class="flex-grow px-4 mt-6 space-y-5 pb-32"></main>

        <div id="catModal" class="fixed inset-0 z-50 bg-black/80 items-center justify-center p-6 backdrop-blur-md">
            <div class="bg-white text-slate-900 w-full max-w-sm rounded-3xl p-8 shadow-2xl">
                <h2 id="modalTitle" class="text-xl font-black mb-6 text-center text-slate-800">カテゴリーを選択</h2>
                <div id="catOptions" class="grid grid-cols-1 gap-1"></div>
                <button onclick="document.getElementById('catModal').classList.remove('active')" class="mt-4 w-full text-slate-400 text-sm font-bold py-2">キャンセル</button>
            </div>
        </div>

        <button id="addBtn" class="fixed bottom-10 right-6 w-16 h-16 bg-gradient-to-tr from-amber-900 to-amber-500 text-white rounded-full shadow-2xl flex items-center justify-center text-4xl z-30 active:scale-90 border-2 border-amber-200/20">
            <span>＋</span>
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAk41dGtCDcDGMmvXmknE6MIJAlVi3AmLQ",
            authDomain: "my-whisky-app.firebaseapp.com",
            projectId: "my-whisky-app",
            storageBucket: "my-whisky-app.firebasestorage.app",
            messagingSenderId: "577760896040",
            appId: "1:577760896040:web:a3e9839ffeaacb8c63c11d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let items = [];
        let tempName = "";
        let editTargetId = null;

        const categories = ["スコッチ", "ジャパニーズ", "アイリッシュ", "アメリカン", "カナディアン", "その他"];

        window.moveItem = async (index, direction) => {
            const newItems = [...items];
            const targetIndex = index + direction;
            if (targetIndex < 0 || targetIndex >= newItems.length) return;
            [newItems[index], newItems[targetIndex]] = [newItems[targetIndex], newItems[index]];
            const batch = writeBatch(db);
            newItems.forEach((item, idx) => {
                const ref = doc(db, "users", auth.currentUser.uid, "whiskies", item.id);
                batch.update(ref, { sortOrder: idx * 10 });
            });
            await batch.commit();
        };

        window.updateStock = async (id, val) => {
            await updateDoc(doc(db, "users", auth.currentUser.uid, "whiskies", id), { remaining: parseInt(val) });
        };

        window.openCategoryEdit = (id, currentName) => {
            editTargetId = id;
            tempName = "";
            document.getElementById('modalTitle').innerText = `${currentName} の分類変更`;
            document.getElementById('catModal').classList.add('active');
        };

        let pressTimer;
        window.startPress = (id, name) => {
            pressTimer = setTimeout(async () => {
                if (confirm(`「${name}」を削除しますか？`)) {
                    await deleteDoc(doc(db, "users", auth.currentUser.uid, "whiskies", id));
                }
            }, 800);
        };
        window.cancelPress = () => clearTimeout(pressTimer);

        onAuthStateChanged(auth, async (user) => {
            if (!user) { await signInAnonymously(auth); return; }
            const q = query(collection(db, "users", user.uid, "whiskies"), orderBy("sortOrder", "asc"));
            onSnapshot(q, (snap) => {
                items = snap.docs.map(d => ({id: d.id, ...d.data()}));
                document.getElementById('stats').innerText = "STOCK: " + items.length;
                document.getElementById('whiskyList').innerHTML = items.map((w, i) => `
                    <div class="whisky-card p-5 shadow-xl relative cat-${w.category || 'その他'}" 
                         onmousedown="startPress('${w.id}', '${w.name}')" onmouseup="cancelPress()" 
                         ontouchstart="startPress('${w.id}', '${w.name}')" ontouchend="cancelPress()">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <span class="tag" onclick="event.stopPropagation(); openCategoryEdit('${w.id}', '${w.name}')">${w.category || 'その他'} ✎</span>
                                <h3 class="font-bold text-xl mt-3 tracking-tight text-slate-900">${w.name}</h3>
                            </div>
                            <div class="text-slate-900 font-black text-2xl">${w.remaining ?? 100}%</div>
                        </div>
                        <input type="range" min="0" max="100" step="5" value="${w.remaining ?? 100}" 
                               oninput="event.stopPropagation(); this.closest('.whisky-card').querySelector('.text-2xl').innerText=this.value+'%'"
                               onchange="updateStock('${w.id}', this.value)"
                               onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()">
                        <div class="absolute right-2 bottom-2 flex space-x-1">
                            <button onclick="event.stopPropagation(); moveItem(${i}, -1)" class="w-10 h-10 bg-white/60 backdrop-blur-sm rounded-xl text-sm font-bold shadow-sm active:bg-white">▲</button>
                            <button onclick="event.stopPropagation(); moveItem(${i}, 1)" class="w-10 h-10 bg-white/60 backdrop-blur-sm rounded-xl text-sm font-bold shadow-sm active:bg-white">▼</button>
                        </div>
                    </div>
                `).join('');
            });
        });

        window.selectCategory = async (category) => {
            document.getElementById('catModal').classList.remove('active');
            if (editTargetId) {
                await updateDoc(doc(db, "users", auth.currentUser.uid, "whiskies", editTargetId), { category });
                editTargetId = null;
            } else if (tempName) {
                await addDoc(collection(db, "users", auth.currentUser.uid, "whiskies"), {
                    name: tempName, category, remaining: 100, createdAt: Date.now(), sortOrder: items.length * 10
                });
                tempName = "";
            }
        };

        document.getElementById('addBtn').onclick = () => {
            const name = prompt("銘柄名を入力してください");
            if (name) {
                tempName = name;
                editTargetId = null;
                document.getElementById('modalTitle').innerText = "カテゴリーを選択";
                document.getElementById('catModal').classList.add('active');
            }
        };

        const catOptions = document.getElementById('catOptions');
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = `category-btn btn-${cat}`;
            btn.innerText = cat;
            btn.onclick = () => selectCategory(cat);
            catOptions.appendChild(btn);
        });
    </script>
</body>
</html>
