<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Whisky Stock Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; background-color: #0f172a; color: #f8fafc; }
        .gold-text { background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        
        .whisky-card { border-radius: 20px; border: 3px solid #4b5563; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }
        .archive-card { filter: grayscale(1) opacity(0.5); border-style: dashed; }
        .wish-card { border: 2px solid #334155; background: #1e293b; }

        /* Category Colors */
        .btn-Scotch, .cat-Scotch { border-color: #2563eb; background: linear-gradient(135deg, #1d4ed8, #1e40af); }
        .btn-Japanese, .cat-Japanese { border-color: #064e3b; background: linear-gradient(135deg, #064e3b, #065f46); } 
        .btn-Irish, .cat-Irish { border-color: #10b981; background: linear-gradient(135deg, #10b981, #059669); } 
        .btn-American, .cat-American { border-color: #f59e0b; background: linear-gradient(135deg, #d97706, #b45309); } 
        .btn-Blended, .cat-Blended { border-color: #94a3b8; background: linear-gradient(135deg, #475569, #1e293b); }
        .btn-Others, .cat-Others { border-color: #334155; background: linear-gradient(135deg, #1e293b, #0f172a); }

        .tag { font-size: 9px; padding: 2px 8px; border-radius: 99px; font-weight: 800; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); text-transform: uppercase; letter-spacing: 0.05em; }
        
        /* Shop Buttons Style */
        .shop-btn { font-size: 8px; font-weight: 900; padding: 6px 4px; border-radius: 8px; background: #0f172a; border: 1px solid #334155; color: #94a3b8; flex: 1; text-align: center; }
        .shop-btn:active { background: #f59e0b; color: #000; border-color: #f59e0b; }

        .slider-container { width: calc(100% - 75px); margin-top: 14px; }
        input[type=range] { -webkit-appearance: none; background: rgba(255,255,255,0.15); height: 6px; border-radius: 3px; width: 100%; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; border: 2px solid white; background: white; }
        
        .sort-btn { font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 8px; background: #1e293b; border: 1px solid #334155; transition: 0.2s; }
        .sort-btn.active { background: #f59e0b; color: #000; border-color: #f59e0b; }

        #modal { display: none; }
        #modal.active { display: flex; z-index: 100; }
        .editing-name { font-size: 1.2rem; font-weight: 900; color: white; display: block; margin-bottom: 20px; border-left: 4px solid #f59e0b; padding-left: 12px; }

        .nav-tab { flex: 1; padding: 14px; font-weight: 900; font-size: 0.7rem; text-align: center; border-bottom: 2px solid transparent; color: #475569; letter-spacing: 0.05em; }
        .nav-tab.active { color: #f59e0b; border-bottom-color: #f59e0b; background: rgba(245, 158, 11, 0.05); }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col relative">
        <header class="bg-black/95 backdrop-blur-xl border-b border-amber-900/30 sticky top-0 z-50">
            <div class="px-6 py-4 text-center">
                <h1 class="text-xl italic gold-text uppercase tracking-[0.2em]">Whisky Stock</h1>
            </div>
            <nav class="flex">
                <div onclick="switchPage('shelf')" id="tab-shelf" class="nav-tab active">SHELF</div>
                <div onclick="switchPage('wish')" id="tab-wish" class="nav-tab">WISH LIST</div>
                <div onclick="switchPage('archive')" id="tab-archive" class="nav-tab">ARCHIVE</div>
            </nav>
            <div id="sort-bar" class="flex justify-between items-center px-4 py-2 bg-slate-900/50 overflow-x-auto no-scrollbar gap-2">
                <span class="text-[9px] font-bold text-slate-500 uppercase shrink-0">Sort:</span>
                <div class="flex gap-1.5">
                    <button onclick="setSort('sortOrder')" id="sort-sortOrder" class="sort-btn active">CUSTOM</button>
                    <button onclick="setSort('category')" id="sort-category" class="sort-btn">CAT</button>
                    <button onclick="setSort('remaining')" id="sort-remaining" class="sort-btn">STOCK</button>
                </div>
            </div>
        </header>

        <main id="whiskyList" class="flex-grow px-4 mt-4 space-y-4 pb-40"></main>

        <div id="modal" class="fixed inset-0 bg-black/90 items-center justify-center p-6 backdrop-blur-md">
            <div class="bg-slate-800 w-full max-w-sm rounded-[32px] p-8 shadow-2xl border border-white/10">
                <span id="editCatTargetName" class="editing-name">---</span>
                <div id="modalOptions" class="grid grid-cols-1 gap-2"></div>
                <button onclick="closeModal()" class="mt-6 w-full text-slate-400 text-sm font-bold py-2">CANCEL</button>
            </div>
        </div>

        <button id="addBtn" class="fixed bottom-8 right-6 w-16 h-16 bg-gradient-to-tr from-amber-900 to-amber-500 text-white rounded-full shadow-2xl flex items-center justify-center text-4xl z-30 active:scale-90 border-2 border-amber-200/30">
            <span>＋</span>
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAk41dGtCDcDGMmvXmknE6MIJAlVi3AmLQ",
            authDomain: "my-whisky-app.firebaseapp.com",
            projectId: "my-whisky-app",
            storageBucket: "my-whisky-app.firebasestorage.app",
            messagingSenderId: "577760896040",
            appId: "1:577760896040:web:a3e9839ffeaacb8c63c11d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let items = [];
        let currentPage = 'shelf';
        let currentSort = 'sortOrder';
        let tempName = "", editTargetId = null;

        const categories = ["Scotch", "Japanese", "Irish", "American", "Blended", "Others"];
        const scotchRegions = ["Speyside", "Highland", "Lowland", "Islay", "Campbeltown", "Islands"];

        window.switchPage = (page) => {
            currentPage = page;
            ['shelf', 'wish', 'archive'].forEach(p => document.getElementById(`tab-${p}`).classList.toggle('active', p === page));
            document.getElementById('sort-bar').style.display = page === 'wish' ? 'none' : 'flex';
            render();
        };

        window.setSort = (key) => {
            currentSort = key;
            ['sortOrder', 'category', 'remaining'].forEach(k => document.getElementById('sort-' + k)?.classList.toggle('active', k === key));
            render();
        };

        // Improved Search Function with direct URL parameters
        window.searchWhisky = (name, site) => {
            const q = encodeURIComponent(name);
            const urls = {
                amz: `https://www.amazon.co.jp/s?k=${q}+%E3%82%A6%E3%82%A4%E3%82%B9%E3%82%AD%E3%83%BC`,
                rkt: `https://search.rakuten.co.jp/search/mall/${q}+%E3%82%A6%E3%82%A4%E3%82%B9%E3%82%AD%E3%83%BC/`,
                mgw: `https://mukawa-spirit.com/?mode=srh&keyword=${q}`,
                snn: `https://www.shinanoya-tokyo.jp/shopbrand/ct834/search?search=${q}`,
                rdr: `http://rudder-shop.com/shopbrand/ct56/search?search=${q}`
            };
            window.open(urls[site], '_blank');
        };

        const render = () => {
            const list = document.getElementById('whiskyList');
            let filtered = items.filter(w => {
                if (currentPage === 'shelf') return w.remaining > 0 && !w.isWish;
                if (currentPage === 'archive') return w.remaining <= 0 && !w.isWish;
                if (currentPage === 'wish') return w.isWish === true;
                return false;
            });

            if (currentPage !== 'wish') {
                filtered.sort((a, b) => {
                    if (currentSort === 'sortOrder') return a.sortOrder - b.sortOrder;
                    if (currentSort === 'remaining') return b.remaining - a.remaining;
                    if (currentSort === 'category') return (a.category||"").localeCompare(b.category||"");
                    return 0;
                });
            }

            list.innerHTML = filtered.map((w, i) => {
                const catDisp = (w.category === 'Scotch' && w.region) ? `${w.category} / ${w.region}` : (w.category || 'Others');
                
                if (w.isWish) {
                    return `
                    <div class="whisky-card p-5 wish-card relative">
                        <div class="flex justify-between items-start mb-3">
                            <div class="flex-1">
                                <span class="tag mb-2 inline-block">${catDisp}</span>
                                <h3 class="font-black text-xl tracking-tighter">${w.name}</h3>
                            </div>
                            <button onclick="moveToShelf('${w.id}')" class="bg-amber-500 text-black font-black text-[10px] px-3 py-2 rounded-lg shadow-lg active:scale-95">GET!</button>
                        </div>
                        <div class="flex gap-1 mt-2">
                            <button onclick="searchWhisky('${w.name}', 'amz')" class="shop-btn">AMZ</button>
                            <button onclick="searchWhisky('${w.name}', 'rkt')" class="shop-btn">楽天</button>
                            <button onclick="searchWhisky('${w.name}', 'mgw')" class="shop-btn">武川</button>
                            <button onclick="searchWhisky('${w.name}', 'snn')" class="shop-btn">信濃屋</button>
                            <button onclick="searchWhisky('${w.name}', 'rdr')" class="shop-btn">RDR</button>
                        </div>
                        <button onclick="deleteWish('${w.id}')" class="absolute -right-2 -top-2 w-6 h-6 bg-slate-700 rounded-full text-[10px] border border-white/10 flex items-center justify-center">✕</button>
                    </div>`;
                }

                return `
                <div class="whisky-card p-5 relative cat-${w.category || 'Others'} ${w.remaining <= 0 ? 'archive-card' : ''}"
                     onmousedown="startPress('${w.id}', '${w.name.replace(/'/g, "\\'")}')" ontouchstart="startPress('${w.id}', '${w.name.replace(/'/g, "\\'")}')" onmouseup="cancelPress()" ontouchend="cancelPress()">
                    <div class="flex justify-between items-start mb-1 pr-16">
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-2">
                                <span class="tag" onclick="event.stopPropagation(); openCatEdit('${w.id}', '${w.name.replace(/'/g, "\\'")}')">${catDisp} ✎</span>
                                <span class="tag bg-black/40 text-amber-400 border-none">${w.abv || 40}%</span>
                            </div>
                            <h3 class="font-black text-xl tracking-tighter break-all leading-tight">${w.name}</h3>
                        </div>
                        <div class="text-white font-black text-2xl opacity-90 text-right">${w.remaining}%</div>
                    </div>
                    ${w.remaining > 0 ? `
                    <div class="slider-container">
                        <input type="range" min="0" max="100" step="5" value="${w.remaining}" 
                               oninput="event.stopPropagation(); this.closest('.whisky-card').querySelector('.text-2xl').innerText=this.value+'%'"
                               onchange="updateStock('${w.id}', this.value)">
                    </div>` : '<div class="text-[10px] mt-6 opacity-40 uppercase font-black tracking-[0.3em] text-center">Finished</div>'}
                    <div class="absolute right-3 top-0 bottom-0 flex flex-col justify-center space-y-2">
                        <button onclick="event.stopPropagation(); moveItem(${i}, -1)" class="w-11 h-12 bg-black/30 rounded-xl border border-white/5 flex items-center justify-center shadow-lg">▲</button>
                        <button onclick="event.stopPropagation(); moveItem(${i}, 1)" class="w-11 h-12 bg-black/30 rounded-xl border border-white/5 flex items-center justify-center shadow-lg">▼</button>
                    </div>
                </div>`;
            }).join('');
        };

        window.moveToShelf = async (id) => {
            if(confirm("在庫(SHELF)に移動しますか？")) {
                await updateDoc(doc(db, "users", auth.currentUser.uid, "whiskies", id), { isWish: false, remaining: 100 });
                switchPage('shelf');
            }
        };

        window.deleteWish = async (id) => { if(confirm("削除しますか？")) await deleteDoc(doc(db, "users", auth.currentUser.uid, "whiskies", id)); };
        window.updateStock = async (id, val) => { await updateDoc(doc(db, "users", auth.currentUser.uid, "whiskies", id), { remaining: parseInt(val) }); };

        window.openCatEdit = (id, name) => { editTargetId = id; document.getElementById('editCatTargetName').innerText = name; showModal(categories); };
        const showModal = (opts, isReg = false) => {
            const m = document.getElementById('modal');
            document.getElementById('modalOptions').innerHTML = opts.map(o => `
                <button onclick="${isReg ? `selectReg('${o}')` : `selectCat('${o}')`}" 
                        class="p-4 rounded-2xl font-black text-white border border-white/10 ${isReg ? 'bg-slate-700' : 'btn-'+o}">
                    ${o}
                </button>
            `).join('');
            m.classList.add('active');
        };

        window.selectCat = (c) => c === "Scotch" ? showModal(scotchRegions, true) : finalize(c, "");
        window.selectReg = (r) => finalize("Scotch", r);
        
        const finalize = async (c, r) => {
            if (editTargetId) {
                await updateDoc(doc(db, "users", auth.currentUser.uid, "whiskies", editTargetId), { category: c, region: r });
            } else {
                const isWish = currentPage === 'wish';
                await addDoc(collection(db, "users", auth.currentUser.uid, "whiskies"), {
                    name: tempName, category: c, region: r, abv: 40, remaining: 100, isWish: isWish, sortOrder: items.length * 10
                });
            }
            closeModal();
        };

        window.closeModal = () => { document.getElementById('modal').classList.remove('active'); editTargetId = null; };

        window.moveItem = async (index, direction) => {
            const filtered = items.filter(w => currentPage === 'shelf' ? (w.remaining > 0 && !w.isWish) : (w.remaining <= 0 && !w.isWish));
            const overallIndex = items.findIndex(item => item.id === filtered[index].id);
            const targetOverallIndex = overallIndex + direction;
            if (targetOverallIndex < 0 || targetOverallIndex >= items.length) return;
            const newItems = [...items];
            [newItems[overallIndex], newItems[targetOverallIndex]] = [newItems[targetOverallIndex], newItems[overallIndex]];
            const batch = writeBatch(db);
            newItems.forEach((item, idx) => batch.update(doc(db, "users", auth.currentUser.uid, "whiskies", item.id), { sortOrder: idx * 10 }));
            await batch.commit();
        };

        let pressTimer;
        window.startPress = (id, name) => pressTimer = setTimeout(async () => { if(confirm(`Delete "${name}"?`)) await deleteDoc(doc(db, "users", auth.currentUser.uid, "whiskies", id)); }, 800);
        window.cancelPress = () => clearTimeout(pressTimer);

        onAuthStateChanged(auth, async (user) => {
            if (!user) { await signInAnonymously(auth); return; }
            onSnapshot(query(collection(db, "users", user.uid, "whiskies"), orderBy("sortOrder", "asc")), (snap) => {
                items = snap.docs.map(d => ({id: d.id, ...d.data()}));
                render();
            });
        });

        document.getElementById('addBtn').onclick = () => {
            const n = prompt(currentPage === 'wish' ? "欲しい銘柄を入力" : "新しいボトル名を入力");
            if (n) { tempName = n; editTargetId = null; document.getElementById('editCatTargetName').innerText = n; showModal(categories); }
        };
    </script>
</body>
</html>
