<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Whisky Stock Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; background-color: #0f172a; color: #f8fafc; }
        .gold-text { background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        .whisky-card { border-radius: 20px; border: 3px solid #4b5563; transition: all 0.3s; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); position: relative; overflow: hidden; }
        .cat-Scotch { border-color: #2563eb; background: linear-gradient(135deg, #1d4ed8, #1e40af); }
        /* その他のカラー設定は維持... */
        .tag { font-size: 9px; padding: 2px 8px; border-radius: 99px; font-weight: 800; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); }
        .stock-display { position: absolute; top: 16px; right: 60px; font-family: monospace; font-size: 1.5rem; font-weight: 900; }
        #sync-banner { background: #f59e0b; color: #000; padding: 10px; text-align: center; font-weight: 900; font-size: 11px; z-index: 100; position: sticky; top: 0; }
    </style>
</head>
<body>
    <div id="sync-banner" style="display:none;">
        データをクラウドに保存（Google連携）
        <button onclick="linkGoogle()" class="ml-3 bg-black text-white px-3 py-1 rounded-full text-[10px]">今すぐ同期</button>
    </div>

    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col relative">
        <header class="bg-black/95 border-b border-amber-900/30 sticky top-0 z-50">
            <div class="px-6 py-4 flex justify-between items-center">
                <h1 class="text-xl italic gold-text uppercase tracking-[0.2em]">Whisky Stock</h1>
                <div id="user-status" class="text-[8px] text-slate-500 font-bold uppercase"></div>
            </div>
            </header>

        <main id="whiskyList" class="flex-grow px-4 mt-4 space-y-4 pb-40"></main>
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, linkWithRedirect, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAk41dGtCDcDGMmvXmknE6MIJAlVi3AmLQ",
            authDomain: "my-whisky-app.firebaseapp.com",
            projectId: "my-whisky-app",
            storageBucket: "my-whisky-app.firebasestorage.app",
            messagingSenderId: "577760896040",
            appId: "1:577760896040:web:a3e9839ffeaacb8c63c11d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // 【重要】今のデータをGoogleに紐付ける処理
        window.linkGoogle = () => {
            if (auth.currentUser) {
                linkWithRedirect(auth.currentUser, provider);
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                // 初回アクセスは匿名ログイン
                await signInAnonymously(auth);
            } else {
                // 匿名ユーザーなら同期バナーを表示
                const banner = document.getElementById('sync-banner');
                banner.style.display = user.isAnonymous ? 'block' : 'none';
                document.getElementById('user-status').innerText = user.isAnonymous ? "Guest Mode" : "Cloud Active";
                
                // データ読み込み（user.uid を使用）
                initApp(user.uid);
            }
        });

        function initApp(uid) {
            onSnapshot(query(collection(db, "users", uid, "whiskies"), orderBy("sortOrder", "asc")), (snap) => {
                // ここに以前の render() 処理を記述
                // ...
            });
        }
        
        // その他の各種関数 (updateStock, editName等) は以前のものをそのまま使用
    </script>
</body>
</html>
