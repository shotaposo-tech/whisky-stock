<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>Whisky Stock Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .gold-text { background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        
        .whisky-card { border-radius: 16px; border: 3px solid #4b5563; color: white; user-select: none; transition: all 0.2s; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2); }
        
        /* Categories with English identifiers */
        .cat-Scotch { border-color: #2563eb; background-color: #1d4ed8; }
        .cat-Scotch input[type=range]::-webkit-slider-thumb { background: #60a5fa; }
        
        .cat-Japanese { border-color: #059669; background-color: #047857; }
        .cat-Japanese input[type=range]::-webkit-slider-thumb { background: #34d399; }
        
        .cat-Irish { border-color: #10b981; background-color: #059669; }
        .cat-Irish input[type=range]::-webkit-slider-thumb { background: #6ee7b7; }
        
        .cat-American { border-color: #d97706; background-color: #b45309; }
        .cat-American input[type=range]::-webkit-slider-thumb { background: #fbbf24; }
        
        .cat-Canadian { border-color: #7c3aed; background-color: #6d28d9; }
        .cat-Canadian input[type=range]::-webkit-slider-thumb { background: #a78bfa; }
        
        .cat-Others { border-color: #4b5563; background-color: #374151; }
        .cat-Others input[type=range]::-webkit-slider-thumb { background: #9ca3af; }

        .tag { font-size: 10px; padding: 2px 10px; border-radius: 99px; font-weight: 900; background: rgba(0,0,0,0.3); color: white; border: 1px solid rgba(255,255,255,0.2); text-transform: uppercase; letter-spacing: 0.05em; }
        
        .slider-container { width: calc(100% - 55px); }
        input[type=range] { -webkit-appearance: none; background: rgba(255,255,255,0.2); height: 8px; border-radius: 4px; width: 100%; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; border: 2px solid white; box-shadow: 0 3px 6px rgba(0,0,0,0.4); }
        
        #catModal { display: none; }
        #catModal.active { display: flex; }
        
        .category-btn { width: 100%; padding: 14px; margin-bottom: 8px; border-radius: 16px; font-weight: 900; font-size: 1rem; color: white; text-align: center; border: 2px solid rgba(255,255,255,0.1); text-transform: capitalize; }
        .btn-Scotch { background: #2563eb; }
        .btn-Japanese { background: #059669; }
        .btn-Irish { background: #10b981; }
        .btn-American { background: #d97706; }
        .btn-Canadian { background: #7c3aed; }
        .btn-Others { background: #4b5563; }
        .btn-sub { background: #334155; font-size: 0.9rem; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 overflow-x-hidden">
    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col relative">
        <header class="bg-black/80 backdrop-blur-md border-b border-amber-900/50 px-6 py-4 sticky top-0 z-20 text-center">
            <h1 class="text-xl italic gold-text uppercase tracking-widest">Whisky Stock</h1>
            <div id="stats" class="absolute right-4 top-5 text-[9px] border border-amber-600 px-2 py-0.5 rounded text-amber-500 font-mono">STOCK: 0</div>
        </header>

        <main id="whiskyList" class="flex-grow px-4 mt-6 space-y-4 pb-40"></main>

        <div id="catModal" class="fixed inset-0 z-50 bg-black/90 items-center justify-center p-6 backdrop-blur-md">
            <div class="bg-slate-800 text-white w-full max-w-sm rounded-[32px] p-8 shadow-2xl border border-white/10">
                <h2 id="modalTitle" class="text-xl font-black mb-6 text-center tracking-tight">Select Category</h2>
                <div id="catOptions" class="grid grid-cols-1 gap-1"></div>
                <button onclick="document.getElementById('catModal').classList.remove('active')" class="mt-6 w-full text-slate-400 text-sm font-bold py-2 uppercase tracking-widest">Cancel</button>
            </div>
        </div>

        <button id="addBtn" class="fixed bottom-8 right-6 w-16 h-16 bg-gradient-to-tr from-amber-900 to-amber-500 text-white rounded-full shadow-2xl flex items-center justify-center text-4xl z-30 active:scale-90 border-2 border-amber-200/30">
            <span>＋</span>
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAk41dGtCDcDGMmvXmknE6MIJAlVi3AmLQ",
            authDomain: "my-whisky-app.firebaseapp.com",
            projectId: "my-whisky-app",
            storageBucket: "my-whisky-app.firebasestorage.app",
            messagingSenderId: "577760896040",
            appId: "1:577760896040:web:a3e9839ffeaacb8c63c11d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let items = [];
        let tempName = "";
        let editTargetId = null;

        const categories = ["Scotch", "Japanese", "Irish", "American", "Canadian", "Others"];
        const scotchRegions = ["Speyside", "Highland", "Lowland", "Islay", "Campbeltown", "Islands", "No Region"];

        window.moveItem = async (index, direction) => {
            const newItems = [...items];
            const targetIndex = index + direction;
            if (targetIndex < 0 || targetIndex >= newItems.length) return;
            [newItems[index], newItems[targetIndex]] = [newItems[targetIndex], newItems[index]];
            const batch = writeBatch(db);
            newItems.forEach((item, idx) => {
                const ref = doc(db, "users", auth.currentUser.uid, "whiskies", item.id);
                batch.update(ref, { sortOrder: idx * 10 });
            });
            await batch.commit();
        };

        window.updateStock = async (id, val) => {
            await updateDoc(doc(db, "users", auth.currentUser.uid, "whiskies", id), { remaining: parseInt(val) });
        };

        window.editBottleName = async (id, currentName) => {
            const newName = prompt("Edit Bottle Name", currentName);
            if (newName && newName !== currentName) {
                await updateDoc(doc(db, "users", auth.currentUser.uid, "whiskies", id), { name: newName });
            }
        };

        window.openCategoryEdit = (id, currentName) => {
            editTargetId = id; tempName = "";
            showCategoryModal("Select Category", categories);
        };

        let pressTimer;
        window.startPress = (id, name) => {
            pressTimer = setTimeout(async () => {
                if (confirm(`Delete "${name}" from stock?`)) {
                    await deleteDoc(doc(db, "users", auth.currentUser.uid, "whiskies", id));
                }
            }, 800);
        };
        window.cancelPress = () => clearTimeout(pressTimer);

        onAuthStateChanged(auth, async (user) => {
            if (!user) { await signInAnonymously(auth); return; }
            const q = query(collection(db, "users", user.uid, "whiskies"), orderBy("sortOrder", "asc"));
            onSnapshot(q, (snap) => {
                items = snap.docs.map(d => ({id: d.id, ...d.data()}));
                document.getElementById('stats').innerText = "STOCK: " + items.length;
                document.getElementById('whiskyList').innerHTML = items.map((w, i) => {
                    const categoryDisplay = w.region && w.region !== "No Region" ? `${w.category} / ${w.region}` : (w.category || 'Others');
                    return `
                    <div class="whisky-card p-4 relative cat-${w.category || 'Others'}" 
                         onmousedown="startPress('${w.id}', '${w.name}')" onmouseup="cancelPress()" 
                         ontouchstart="startPress('${w.id}', '${w.name}')" ontouchend="cancelPress()">
                        
                        <div class="flex justify-between items-start mb-3 pr-12">
                            <div class="flex-1">
                                <span class="tag" onclick="event.stopPropagation(); openCategoryEdit('${w.id}', '${w.name}')">${categoryDisplay} ✎</span>
                                <h3 class="font-black text-xl mt-2 tracking-tighter leading-tight break-all" onclick="event.stopPropagation(); editBottleName('${w.id}', '${w.name}')">
                                    ${w.name} <span class="text-xs opacity-50">✎</span>
                                </h3>
                            </div>
                            <div class="text-white font-black text-2xl opacity-90 ml-2">${w.remaining ?? 100}<span class="text-xs ml-1">%</span></div>
                        </div>

                        <div class="slider-container">
                             <input type="range" min="0" max="100" step="5" value="${w.remaining ?? 100}" 
                               oninput="event.stopPropagation(); this.closest('.whisky-card').querySelector('.text-2xl').innerHTML=this.value+'<span class=\'text-xs ml-1\'>%</span>'"
                               onchange="updateStock('${w.id}', this.value)"
                               onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()">
                        </div>

                        <div class="absolute right-2 top-0 bottom-0 flex flex-col justify-center space-y-1">
                            <button onclick="event.stopPropagation(); moveItem(${i}, -1)" class="w-10 h-12 bg-black/30 backdrop-blur-sm rounded-lg text-sm border border-white/20 active:bg-white/40">▲</button>
                            <button onclick="event.stopPropagation(); moveItem(${i}, 1)" class="w-10 h-12 bg-black/30 backdrop-blur-sm rounded-lg text-sm border border-white/20 active:bg-white/40">▼</button>
                        </div>
                    </div>
                `}).join('');
            });
        });

        const showCategoryModal = (title, options, isRegion = false) => {
            const modal = document.getElementById('catModal');
            const catOptions = document.getElementById('catOptions');
            document.getElementById('modalTitle').innerText = title;
            catOptions.innerHTML = '';
            
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = isRegion ? 'category-btn btn-sub' : `category-btn btn-${opt}`;
                btn.innerText = opt;
                btn.onclick = () => isRegion ? selectRegion(opt) : selectCategory(opt);
                catOptions.appendChild(btn);
            });
            modal.classList.add('active');
        };

        window.selectCategory = async (category) => {
            if (category === "Scotch") {
                showCategoryModal("Select Region", scotchRegions, true);
            } else {
                finalizeUpdate(category, "");
            }
        };

        window.selectRegion = async (region) => {
            finalizeUpdate("Scotch", region);
        };

        const finalizeUpdate = async (category, region) => {
            document.getElementById('catModal').classList.remove('active');
            if (editTargetId) {
                await updateDoc(doc(db, "users", auth.currentUser.uid, "whiskies", editTargetId), { category, region });
                editTargetId = null;
            } else if (tempName) {
                await addDoc(collection(db, "users", auth.currentUser.uid, "whiskies"), {
                    name: tempName, category, region, remaining: 100, createdAt: Date.now(), sortOrder: items.length * 10
                });
                tempName = "";
            }
        };

        document.getElementById('addBtn').onclick = () => {
            const name = prompt("Enter Bottle Name");
            if (name) { tempName = name; editTargetId = null;
                showCategoryModal("Select Category", categories);
            }
        };
    </script>
</body>
</html>
