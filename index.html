<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <link rel="apple-touch-icon" href="apple-touch-icon%202.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Whisky Stock Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; background-color: #0f172a; color: #f8fafc; overflow-x: hidden; }
        .gold-text { background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        .whisky-card { border-radius: 20px; border: 3px solid #4b5563; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); position: relative; overflow: hidden; background: #1e293b; }
        .archive-card { filter: grayscale(1) opacity(0.5); border-style: dashed; }
        .wish-card { border: 2px solid #334155; background: #1e293b; }
        .tag { font-size: 9px; padding: 2px 8px; border-radius: 99px; font-weight: 800; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; display: inline-block; color: #fbbf24; }
        .slider-container { width: calc(100% - 75px); margin-top: 14px; position: relative; z-index: 10; }
        input[type=range] { -webkit-appearance: none; background: rgba(255,255,255,0.15); height: 12px; border-radius: 6px; width: 100%; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 28px; width: 28px; border-radius: 50%; border: 2px solid white; background: white; }
        .sort-btn { font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 8px; background: #1e293b; border: 1px solid #334155; transition: 0.2s; }
        .sort-btn.active { background: #f59e0b; color: #000; border-color: #f59e0b; }
        #modal { display: none; }
        #modal.active { display: flex; z-index: 100; }
        .nav-tab { flex: 1; padding: 14px; font-weight: 900; font-size: 0.7rem; text-align: center; color: #475569; letter-spacing: 0.05em; }
        .nav-tab.active { color: #f59e0b; border-bottom: 2px solid #f59e0b; background: rgba(245, 158, 11, 0.05); }
        .stock-display { position: absolute; top: 16px; right: 60px; font-family: ui-monospace, monospace; pointer-events: none; font-weight: 900; font-size: 1.5rem; }
        .btn-Scotch { border-color: #2563eb; } .btn-Japanese { border-color: #064e3b; } 
    </style>
</head>
<body>
    <div id="loading-overlay" class="fixed inset-0 flex items-center justify-center bg-slate-900 z-50">
        <div class="text-amber-500 font-bold animate-pulse uppercase tracking-[0.3em]">Master Collection</div>
    </div>

    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col relative hidden">
        <header class="bg-black/95 border-b border-amber-900/30 sticky top-0 z-30">
            <div class="px-6 py-4 flex justify-center items-center">
                <h1 class="text-xl italic gold-text uppercase tracking-[0.2em]">Whisky Stock</h1>
            </div>
            <nav class="flex">
                <div onclick="switchPage('shelf')" id="tab-shelf" class="nav-tab active">SHELF</div>
                <div onclick="switchPage('wish')" id="tab-wish" class="nav-tab">WISH LIST</div>
                <div onclick="switchPage('archive')" id="tab-archive" class="nav-tab">ARCHIVE</div>
            </nav>
            <div class="flex justify-center items-center px-4 py-2 bg-slate-900/50 gap-2 overflow-x-auto">
                <button onclick="setSort('name')" id="sort-name" class="sort-btn active">NAME</button>
                <button onclick="setSort('category')" id="sort-category" class="sort-btn">CAT</button>
                <button onclick="setSort('remaining')" id="sort-remaining" class="sort-btn">STOCK</button>
            </div>
        </header>

        <main id="whiskyList" class="flex-grow px-4 mt-4 space-y-4 pb-40"></main>

        <div id="modal" class="fixed inset-0 bg-black/90 items-center justify-center p-6 backdrop-blur-md">
            <div class="bg-slate-800 w-full max-w-sm rounded-[32px] p-8 border border-white/10 shadow-2xl">
                <span id="editCatTargetName" class="text-white font-bold mb-6 block text-lg border-l-4 border-amber-500 pl-3">CATEGORY</span>
                <div id="modalOptions" class="grid grid-cols-2 gap-3"></div>
                <button onclick="closeModal()" class="mt-8 w-full text-slate-400 font-bold py-2">CANCEL</button>
            </div>
        </div>

        <button id="addBtn" class="fixed bottom-8 right-6 w-16 h-16 bg-gradient-to-tr from-amber-900 to-amber-500 text-white rounded-full shadow-2xl flex items-center justify-center text-4xl z-30 active:scale-90 border-2 border-amber-200/30">＋</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAk41dGtCDcDGMmvXmknE6MIJAlVi3AmLQ",
            authDomain: "my-whisky-app.firebaseapp.com",
            projectId: "my-whisky-app",
            storageBucket: "my-whisky-app.firebasestorage.app",
            messagingSenderId: "577760896040",
            appId: "1:577760896040:web:a3e9839ffeaacb8c63c11d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 確定したメインのID
        const targetUID = "yE6g8Wf24sgKDat5wracCN2STTJ2"; 

        let items = [];
        let currentPage = 'shelf';
        let currentSort = 'name';
        let tempName = "";

        const q = query(collection(db, "users", targetUID, "whiskies"));
        
        onSnapshot(q, (snap) => {
            document.getElementById('loading-overlay').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            items = snap.docs.map(d => {
                const data = d.data();
                const stock = data.remaining !== undefined ? data.remaining : (data.percent !== undefined ? data.percent : 100);
                return { id: d.id, ...data, displayStock: stock };
            });
            render();
        });

        window.switchPage = (page) => {
            currentPage = page;
            ['shelf', 'wish', 'archive'].forEach(p => document.getElementById(`tab-${p}`).classList.toggle('active', p === page));
            render();
        };

        window.setSort = (key) => {
            currentSort = key;
            ['name', 'category', 'remaining'].forEach(k => document.getElementById('sort-' + k).classList.toggle('active', k === key));
            render();
        };

        const render = () => {
            const list = document.getElementById('whiskyList');
            let filtered = items.filter(w => {
                if (currentPage === 'shelf') return w.displayStock > 0 && !w.isWish;
                if (currentPage === 'archive') return w.displayStock <= 0 && !w.isWish;
                if (currentPage === 'wish') return w.isWish === true;
                return false;
            });

            filtered.sort((a, b) => {
                if (currentSort === 'remaining') return b.displayStock - a.displayStock;
                return (a[currentSort] || "").toString().localeCompare((b[currentSort] || "").toString());
            });

            list.innerHTML = filtered.map(w => `
                <div class="whisky-card p-5 ${currentPage === 'archive' ? 'archive-card' : ''}" oncontextmenu="deleteItem('${w.id}', '${w.name}'); return false;">
                    <div class="stock-display">${w.displayStock}%</div>
                    <div class="pr-16">
                        <div class="flex gap-2 mb-2">
                            <span class="tag">${w.category || 'Whisky'}${w.region ? ' / ' + w.region : ''}</span>
                        </div>
                        <h3 class="font-black text-xl tracking-tighter leading-tight" onclick="editName('${w.id}', '${w.name}')">${w.name}</h3>
                    </div>
                    ${w.isWish ? `
                        <button onclick="moveToShelf('${w.id}')" class="mt-4 w-full bg-amber-500 text-black font-black py-2 rounded-xl text-xs">GET & ADD TO SHELF</button>
                    ` : `
                        <div class="slider-container">
                            <input type="range" min="0" max="100" step="5" value="${w.displayStock}" onchange="updateStock('${w.id}', this.value)">
                        </div>
                    `}
                </div>
            `).join('');
        };

        window.updateStock = async (id, val) => {
            await updateDoc(doc(db, "users", targetUID, "whiskies", id), { remaining: parseInt(val), percent: parseInt(val) });
        };

        window.editName = async (id, old) => {
            const n = prompt("銘柄名を変更", old);
            if (n && n !== old) await updateDoc(doc(db, "users", targetUID, "whiskies", id), { name: n });
        };

        window.moveToShelf = async (id) => {
            await updateDoc(doc(db, "users", targetUID, "whiskies", id), { isWish: false, remaining: 100, percent: 100 });
        };

        window.deleteItem = async (id, name) => {
            if (confirm(`「${name}」を削除しますか？`)) await deleteDoc(doc(db, "users", targetUID, "whiskies", id));
        };

        // 追加機能
        const categories = ["Scotch", "Japanese", "Irish", "American", "Blended", "Others"];
        const scotchRegions = ["Speyside", "Highland", "Lowland", "Islay", "Islands"];

        document.getElementById('addBtn').onclick = () => {
            const n = prompt(currentPage === 'wish' ? "WISH銘柄を入力" : "新しい銘柄名を入力");
            if (n) { tempName = n; openModal(categories); }
        };

        const openModal = (opts, isReg = false) => {
            document.getElementById('modal').classList.add('active');
            document.getElementById('modalOptions').innerHTML = opts.map(o => `
                <button onclick="${isReg ? `selectReg('${o}')` : `selectCat('${o}')`}" class="p-4 rounded-xl bg-slate-700 text-white font-bold text-xs border border-white/5 active:bg-amber-600">${o}</button>
            `).join('');
        };

        window.selectCat = (c) => c === "Scotch" ? openModal(scotchRegions, true) : finalize(c, "");
        window.selectReg = (r) => finalize("Scotch", r);

        const finalize = async (c, r) => {
            await addDoc(collection(db, "users", targetUID, "whiskies"), {
                name: tempName,
                category: c,
                region: r,
                remaining: 100,
                percent: 100,
                isWish: (currentPage === 'wish'),
                sortOrder: Date.now()
            });
            closeModal();
        };

        window.closeModal = () => document.getElementById('modal').classList.remove('active');
    </script>
</body>
</html>
