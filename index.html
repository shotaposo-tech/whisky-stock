<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>Whisky Stock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
        .gold-text { background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        
        .whisky-card { border-radius: 20px; border: 4px solid #4b5563; color: white; user-select: none; transition: all 0.2s; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }
        
        .cat-スコッチ { border-color: #2563eb; background-color: #1d4ed8; }
        .cat-スコッチ input[type=range]::-webkit-slider-thumb { background: #60a5fa; }
        
        .cat-ジャパニーズ { border-color: #dc2626; background-color: #b91c1c; }
        .cat-ジャパニーズ input[type=range]::-webkit-slider-thumb { background: #f87171; }
        
        .cat-アイリッシュ { border-color: #059669; background-color: #047857; }
        .cat-アイリッシュ input[type=range]::-webkit-slider-thumb { background: #34d399; }
        
        .cat-アメリカン { border-color: #d97706; background-color: #b45309; }
        .cat-アメリカン input[type=range]::-webkit-slider-thumb { background: #fbbf24; }
        
        .cat-カナディアン { border-color: #7c3aed; background-color: #6d28d9; }
        .cat-カナディアン input[type=range]::-webkit-slider-thumb { background: #a78bfa; }
        
        .cat-その他 { border-color: #4b5563; background-color: #374151; }
        .cat-その他 input[type=range]::-webkit-slider-thumb { background: #9ca3af; }

        .tag { font-size: 11px; padding: 4px 12px; border-radius: 99px; font-weight: 900; background: rgba(0,0,0,0.3); color: white; border: 1px solid rgba(255,255,255,0.2); }
        
        /* スライダー：右側のボタンに被らないよう幅を制限 */
        .slider-container { width: calc(100% - 60px); }
        input[type=range] { -webkit-appearance: none; background: rgba(255,255,255,0.2); height: 10px; border-radius: 5px; width: 100%; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 30px; width: 30px; border-radius: 50%; border: 3px solid white; box-shadow: 0 4px 8px rgba(0,0,0,0.4); }
        
        #catModal { display: none; }
        #catModal.active { display: flex; }
        
        .category-btn { width: 100%; padding: 18px; margin-bottom: 12px; border-radius: 20px; font-weight: 900; font-size: 1.2rem; color: white; text-align: center; border: 2px solid rgba(255,255,255,0.1); }
        .btn-スコッチ { background: #2563eb; }
        .btn-ジャパニーズ { background: #dc2626; }
        .btn-アイリッシュ { background: #059669; }
        .btn-アメリカン { background: #d97706; }
        .btn-カナディアン { background: #7c3aed; }
        .btn-その他 { background: #4b5563; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 overflow-x-hidden">
    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col relative">
        <header class="bg-black/80 backdrop-blur-md border-b border-amber-900/50 px-6 py-6 sticky top-0 z-20 text-center text-slate-100">
            <h1 class="text-2xl italic gold-text">Whisky Stock</h1>
            <div id="stats" class="absolute right-4 top-7 text-[10px] border border-amber-600 px-2 py-0.5 rounded text-amber-500 font-mono">STOCK: 0</div>
        </header>

        <main id="whiskyList" class="flex-grow px-4 mt-8 space-y-6 pb-40"></main>

        <div id="catModal" class="fixed inset-0 z-50 bg-black/90 items-center justify-center p-6 backdrop-blur-md">
            <div class="bg-slate-800 text-white w-full max-w-sm rounded-[32px] p-8 shadow-2xl border border-white/10">
                <h2 id="modalTitle" class="text-xl font-black mb-6 text-center">カテゴリーを選択</h2>
                <div id="catOptions" class="grid grid-cols-1 gap-1"></div>
                <button onclick="document.getElementById('catModal').classList.remove('active')" class="mt-6 w-full text-slate-400 text-sm font-bold py-2">キャンセル</button>
            </div>
        </div>

        <button id="addBtn" class="fixed bottom-10 right-6 w-18 h-18 bg-gradient-to-tr from-amber-900 to-amber-500 text-white rounded-full shadow-2xl flex items-center justify-center text-4xl z-30 active:scale-90 border-4 border-amber-200/30">
            <span>＋</span>
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAk41dGtCDcDGMmvXmknE6MIJAlVi3AmLQ",
            authDomain: "my-whisky-app.firebaseapp.com",
            projectId: "my-whisky-app",
            storageBucket: "my-whisky-app.firebasestorage.app",
            messagingSenderId: "577760896040",
            appId: "1:577760896040:web:a3e9839ffeaacb8c63c11d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let items = [];
        let tempName = "";
        let editTargetId = null;

        const categories = ["スコッチ", "ジャパニーズ", "アイリッシュ", "アメリカン", "カナディアン", "その他"];

        window.moveItem = async (index, direction) => {
            const newItems = [...items];
            const targetIndex = index + direction;
            if (targetIndex < 0 || targetIndex >= newItems.length) return;
            [newItems[index], newItems[targetIndex]] = [newItems[targetIndex], newItems[index]];
            const batch = writeBatch(db);
            newItems.forEach((item, idx) => {
                const ref = doc(db, "users", auth.currentUser.uid, "whiskies", item.id);
                batch.update(ref, { sortOrder: idx * 10 });
            });
            await batch.commit();
        };

        window.updateStock = async (id, val) => {
            await updateDoc(doc(db, "users", auth.currentUser.uid, "whiskies", id), { remaining: parseInt(val) });
        };

        window.openCategoryEdit = (id, currentName) => {
            editTargetId = id; tempName = "";
            document.getElementById('modalTitle').innerText = `${currentName} の分類変更`;
            document.getElementById('catModal').classList.add('active');
        };

        let pressTimer;
        window.startPress = (id, name) => {
            pressTimer = setTimeout(async () => {
                if (confirm(`「${name}」を削除しますか？`)) {
                    await deleteDoc(doc(db, "users", auth.currentUser.uid, "whiskies", id));
                }
            }, 800);
        };
        window.cancelPress = () => clearTimeout(pressTimer);

        onAuthStateChanged(auth, async (user) => {
            if (!user) { await signInAnonymously(auth); return; }
            const q = query(collection(db, "users", user.uid, "whiskies"), orderBy("sortOrder", "asc"));
            onSnapshot(q, (snap) => {
                items = snap.docs.map(d => ({id: d.id, ...d.data()}));
                document.getElementById('stats').innerText = "STOCK: " + items.length;
                document.getElementById('whiskyList').innerHTML = items.map((w, i) => `
                    <div class="whisky-card p-6 relative cat-${w.category || 'その他'}" 
                         onmousedown="startPress('${w.id}', '${w.name}')" onmouseup="cancelPress()" 
                         ontouchstart="startPress('${w.id}', '${w.name}')" ontouchend="cancelPress()">
                        
                        <div class="flex justify-between items-start mb-6 pr-12">
                            <div class="flex-1">
                                <span class="tag" onclick="event.stopPropagation(); openCategoryEdit('${w.id}', '${w.name}')">${w.category || 'その他'} ✎</span>
                                <h3 class="font-black text-2xl mt-4 tracking-tighter leading-tight break-all">${w.name}</h3>
                            </div>
                            <div class="text-white font-black text-3xl opacity-90 ml-2">${w.remaining ?? 100}<span class="text-sm ml-1">%</span></div>
                        </div>

                        <div class="slider-container">
                             <input type="range" min="0" max="100" step="5" value="${w.remaining ?? 100}" 
                               oninput="event.stopPropagation(); this.closest('.whisky-card').querySelector('.text-3xl').innerHTML=this.value+'<span class=\'text-sm ml-1\'>%</span>'"
                               onchange="updateStock('${w.id}', this.value)"
                               onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()">
                        </div>

                        <div class="absolute right-3 top-0 bottom-0 flex flex-col justify-center space-y-2">
                            <button onclick="event.stopPropagation(); moveItem(${i}, -1)" class="w-12 h-14 bg-black/30 backdrop-blur-sm rounded-xl text-lg font-bold border border-white/20 active:bg-white/40 transition-all">▲</button>
                            <button onclick="event.stopPropagation(); moveItem(${i}, 1)" class="w-12 h-14 bg-black/30 backdrop-blur-sm rounded-xl text-lg font-bold border border-white/20 active:bg-white/40 transition-all">▼</button>
                        </div>
                    </div>
                `).join('');
            });
        });

        window.selectCategory = async (category) => {
            document.getElementById('catModal').classList.remove('active');
            if (editTargetId) {
                await updateDoc(doc(db, "users", auth.currentUser.uid, "whiskies", editTargetId), { category });
                editTargetId = null;
            } else if (tempName) {
                await addDoc(collection(db, "users", auth.currentUser.uid, "whiskies"), {
                    name: tempName, category, remaining: 100, createdAt: Date.now(), sortOrder: items.length * 10
                });
                tempName = "";
            }
        };

        document.getElementById('addBtn').onclick = () => {
            const name = prompt("銘柄名を入力してください");
            if (name) { tempName = name; editTargetId = null; 
                document.getElementById('modalTitle').innerText = "カテゴリーを選択";
                document.getElementById('catModal').classList.add('active');
            }
        };

        const catOptions = document.getElementById('catOptions');
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = `category-btn btn-${cat}`;
            btn.innerText = cat;
            btn.onclick = () => selectCategory(cat);
            catOptions.appendChild(btn);
        });
    </script>
</body>
</html>
