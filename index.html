<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Whisky Stock ウイスキー在庫管理</title>
<script src="https://www.google.com/search?q=https://cdn.tailwindcss.com"></script>
<style>
body{-webkit-tap-highlight-color:transparent;font-family:-apple-system,sans-serif;}
.gold-text{background:linear-gradient(to right,#bf953f,#fcf6ba,#b38728,#fbf5b7,#aa771c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:900;}
.whisky-card{transition:transform 0.1s;background:linear-gradient(145deg,#ffffff,#f0f0f0);border-left:4px solid #b38728;}
.whisky-card:active{transform:scale(0.98);}
</style>
</head>
<body class="bg-slate-900 text-slate-100">
<div id="app" class="max-w-md mx-auto min-h-screen flex flex-col relative">
<header class="bg-black/80 backdrop-blur-md border-b border-amber-900/50 px-6 py-6 sticky top-0 z-10 shadow-xl text-center">
<h1 class="text-3xl italic gold-text tracking-tighter">Whisky Stock</h1>
<p class="text-[10px] text-amber-500 font-black tracking-[0.3em] uppercase mt-1">Premium Collection</p>
<div id="stats" class="absolute right-4 top-7 text-[10px] border border-amber-600 px-2 py-0.5 rounded text-amber-500 font-mono">STOCK: 0</div>
</header>
<main id="whiskyList" class="flex-grow px-4 mt-8 space-y-4 pb-32"></main>
<button id="addBtn" class="fixed bottom-10 right-6 w-16 h-16 bg-gradient-to-tr from-amber-900 via-amber-700 to-amber-500 text-white rounded-full shadow-[0_0_20px_rgba(184,134,11,0.5)] flex items-center justify-center text-4xl z-20 active:brightness-125 border-2 border-amber-200/30">
<span class="mb-1">＋</span>
</button>
</div>
<script type="module">
import { initializeApp } from "https://www.google.com/search?q=https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.google.com/search?q=https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.google.com/search?q=https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
const firebaseConfig = {
apiKey: "AIzaSyAk41dGtCDcDGMmvXmknE6MXu_fE_6_R-o",
authDomain: "https://www.google.com/search?q=my-whisky-app.firebaseapp.com",
projectId: "my-whisky-app",
storageBucket: "my-whisky-app.firebasestorage.app",
messagingSenderId: "599572459740",
appId: "1:599572459740:web:9f8e4e7e6f8a4e7e6f8a4e"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
onAuthStateChanged(auth, async (user) => {
if (user) {
const colRef = collection(db, "users", user.uid, "whiskies");
onSnapshot(colRef, (snapshot) => {
const data = snapshot.docs.map(d => ({id: d.id, ...d.data()}));
data.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
document.getElementById('stats').innerText = "STOCK: " + data.length;
const listEl = document.getElementById('whiskyList');
if (data.length === 0) {
listEl.innerHTML = '<div class="text-center py-20 opacity-30 text-amber-200 font-bold"><p>No Collection</p></div>';
} else {
listEl.innerHTML = data.map(w => `
<div class="whisky-card p-5 rounded-lg flex justify-between items-center">
<div class="flex-1 pr-4">
<h3 class="font-bold text-slate-800 break-all leading-tight">{w.name}&lt;/h3&gt;
&lt;p class=&quot;text-[9px] text-slate-400 mt-1 uppercase font-mono tracking-tighter&quot;&gt;{new Date(w.createdAt).toLocaleDateString()}</p>
</div>
<div class="flex flex-col items-end">
<div class="text-amber-900 font-black text-2xl">${w.remaining || 100}<span class="text-xs ml-0.5">%</span></div>
<div class="w-16 h-1 bg-slate-200 rounded-full mt-1 overflow-hidden">
<div class="h-full bg-amber-600" style="width: ${w.remaining || 100}%"></div>
</div>
</div>
</div>`).join('');
}
});
} else {
await signInAnonymously(auth);
}
});
document.getElementById('addBtn').onclick = async () => {
const name = prompt("ウイスキーの銘柄名を入力してください");
if (name && auth.currentUser) {
try {
await addDoc(collection(db, "users", auth.currentUser.uid, "whiskies"), {
name: name, remaining: 100, createdAt: Date.now()
});
} catch (e) { alert("エラー: " + e.message); }
}
};
</script>
</body>
</html>
