<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>Whisky Stock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
        .gold-text { background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        .whisky-card { background: #fff; border-radius: 12px; border-left: 6px solid #b38728; color: #1e293b; user-select: none; }
        
        /* カテゴリーごとの色 */
        .cat-スコッチ { border-left-color: #4338ca; }
        .cat-ジャパニーズ { border-left-color: #b91c1c; }
        .cat-アイリッシュ { border-left-color: #15803d; }
        .cat-アメリカン { border-left-color: #a21caf; }
        .cat-カナディアン { border-left-color: #0369a1; }
        .cat-その他 { border-left-color: #4b5563; }
        
        .tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; background: #f1f5f9; color: #475569; }
        input[type=range] { -webkit-appearance: none; background: #e2e8f0; height: 6px; border-radius: 3px; width: 100%; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; background: #b45309; height: 18px; width: 18px; border-radius: 50%; border: 2px solid white; }
        
        /* モーダル表示のアニメーション */
        #catModal { display: none; }
        #catModal.active { display: flex; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 overflow-x-hidden">
    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col relative">
        <header class="bg-black/80 backdrop-blur-md border-b border-amber-900/50 px-6 py-6 sticky top-0 z-20 text-center">
            <h1 class="text-2xl italic gold-text">Whisky Stock</h1>
            <div id="stats" class="absolute right-4 top-7 text-[10px] border border-amber-600 px-2 py-0.5 rounded text-amber-500 font-mono">STOCK: 0</div>
        </header>

        <main id="whiskyList" class="flex-grow px-4 mt-6 space-y-4 pb-32"></main>

        <div id="catModal" class="fixed inset-0 z-50 bg-black/60 items-center justify-center p-6 backdrop-blur-sm">
            <div class="bg-white text-slate-900 w-full max-w-xs rounded-2xl p-6 shadow-2xl">
                <h2 class="text-lg font-bold mb-4 text-center">カテゴリーを選択</h2>
                <div id="catOptions" class="grid grid-cols-1 gap-2">
                    </div>
            </div>
        </div>

        <button id="addBtn" class="fixed bottom-10 right-6 w-16 h-16 bg-gradient-to-tr from-amber-900 to-amber-500 text-white rounded-full shadow-2xl flex items-center justify-center text-4xl z-30 active:scale-90">
            <span>＋</span>
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAk41dGtCDcDGMmvXmknE6MIJAlVi3AmLQ",
            authDomain: "my-whisky-app.firebaseapp.com",
            projectId: "my-whisky-app",
            storageBucket: "my-whisky-app.firebasestorage.app",
            messagingSenderId: "577760896040",
            appId: "1:577760896040:web:a3e9839ffeaacb8c63c11d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let items = [];
        let tempName = ""; // 名前を一時保存

        const categories = ["スコッチ", "ジャパニーズ", "アイリッシュ", "アメリカン", "カナディアン", "その他"];

        window.moveItem = async (index, direction) => {
            const newItems = [...items];
            const targetIndex = index + direction;
            if (targetIndex < 0 || targetIndex >= newItems.length) return;
            [newItems[index], newItems[targetIndex]] = [newItems[targetIndex], newItems[index]];
            const batch = writeBatch(db);
            newItems.forEach((item, idx) => {
                const ref = doc(db, "users", auth.currentUser.uid, "whiskies", item.id);
                batch.update(ref, { sortOrder: idx * 10 });
            });
            await batch.commit();
        };

        window.updateStock = async (id, val) => {
            await updateDoc(doc(db, "users", auth.currentUser.uid, "whiskies", id), { remaining: parseInt(val) });
        };

        let pressTimer;
        window.startPress = (id, name) => {
            pressTimer = setTimeout(async () => {
                if (confirm(`「${name}」を削除しますか？`)) {
                    await deleteDoc(doc(db, "users", auth.currentUser.uid, "whiskies", id));
                }
            }, 800);
        };
        window.cancelPress = () => clearTimeout(pressTimer);

        onAuthStateChanged(auth, async (user) => {
            if (!user) { await signInAnonymously(auth); return; }
            const q = query(collection(db, "users", user.uid, "whiskies"), orderBy("sortOrder", "asc"));
            onSnapshot(q, (snap) => {
                items = snap.docs.map(d => ({id: d.id, ...d.data()}));
                document.getElementById('stats').innerText = "STOCK: " + items.length;
                document.getElementById('whiskyList').innerHTML = items.map((w, i) => `
                    <div class="whisky-card p-4 shadow-md relative cat-${w.category || 'その他'}" 
                         onmousedown="startPress('${w.id}', '${w.name}')" onmouseup="cancelPress()" 
                         ontouchstart="startPress('${w.id}', '${w.name}')" ontouchend="cancelPress()">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <span class="tag">${w.category || 'その他'}</span>
                                <h3 class="font-bold text-lg mt-1">${w.name}</h3>
                            </div>
                            <div class="text-amber-800 font-black text-xl">${w.remaining ?? 100}%</div>
                        </div>
                        <input type="range" min="0" max="100" step="5" value="${w.remaining ?? 100}" 
                               oninput="this.closest('.whisky-card').querySelector('.text-xl').innerText=this.value+'%'"
                               onchange="updateStock('${w.id}', this.value)"
                               onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()">
                        <div class="absolute right-2 bottom-2 flex space-x-1">
                            <button onclick="event.stopPropagation(); moveItem(${i}, -1)" class="p-2 bg-slate-100 rounded text-xs opacity-50 active:opacity-100">▲</button>
                            <button onclick="event.stopPropagation(); moveItem(${i}, 1)" class="p-2 bg-slate-100 rounded text-xs opacity-50 active:opacity-100">▼</button>
                        </div>
                    </div>
                `).join('');
            });
        });

        // カテゴリーを選択して保存する処理
        window.saveWithCategory = async (category) => {
            document.getElementById('catModal').classList.remove('active');
            if (!tempName) return;
            try {
                await addDoc(collection(db, "users", auth.currentUser.uid, "whiskies"), {
                    name: tempName,
                    category: category,
                    remaining: 100,
                    createdAt: Date.now(),
                    sortOrder: items.length * 10
                });
                tempName = "";
            } catch (e) { alert("保存エラー: " + e.message); }
        };

        // ＋ボタン：名前を聞いてからモーダルを出す
        document.getElementById('addBtn').onclick = () => {
            const name = prompt("銘柄名を入力してください");
            if (name) {
                tempName = name;
                document.getElementById('catModal').classList.add('active');
            }
        };

        // モーダル内のボタン生成
        const catOptions = document.getElementById('catOptions');
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = "w-full py-3 bg-slate-100 rounded-xl font-bold active:bg-amber-100 transition-colors";
            btn.innerText = cat;
            btn.onclick = () => saveWithCategory(cat);
            catOptions.appendChild(btn);
        });
    </script>
</body>
</html>
