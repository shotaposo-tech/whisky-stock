<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <link rel="apple-touch-icon" href="apple-touch-icon%202.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Whisky Stock Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; background-color: #020617; color: #f8fafc; overflow-x: hidden; touch-action: pan-y; }
        .gold-text { background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        
        /* カード全体の高さを統一し、中央揃えレイアウトに */
        .whisky-card { height: 150px; border-radius: 20px; border: 3px solid rgba(255,255,255,0.1); box-shadow: 0 8px 16px -4px rgba(0, 0, 0, 0.6); position: relative; overflow: hidden; margin-bottom: 1rem; background: #020617; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        
        .cat-Scotch { background: linear-gradient(180deg, rgba(37, 99, 235, 0.35), #020617); border-color: rgba(37, 99, 235, 0.5); }
        .cat-Japanese { background: linear-gradient(180deg, rgba(16, 185, 129, 0.35), #020617); border-color: rgba(16, 185, 129, 0.5); }
        .cat-Irish { background: linear-gradient(180deg, rgba(5, 150, 105, 0.35), #020617); border-color: rgba(5, 150, 105, 0.5); }
        .cat-American { background: linear-gradient(180deg, rgba(245, 158, 11, 0.35), #020617); border-color: rgba(245, 158, 11, 0.5); }
        .cat-Blended { background: linear-gradient(180deg, rgba(148, 163, 184, 0.25), #020617); border-color: rgba(148, 163, 184, 0.4); }
        .cat-Others { background: linear-gradient(180deg, rgba(51, 65, 85, 0.35), #020617); border-color: rgba(71, 85, 105, 0.5); }

        .tag { font-size: 8px; padding: 1px 6px; border-radius: 99px; font-weight: 800; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); color: #fbbf24; white-space: nowrap; }
        .flv-tag { font-size: 9px; padding: 1px 8px; border-radius: 4px; background: linear-gradient(to bottom, #f59e0b, #b45309); color: #fff; font-weight: 900; margin-top: 4px; }
        .flv-empty { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.25); border: 1px dashed rgba(255,255,255,0.1); }

        /* 中央配置用の残量表示 */
        .stock-display { font-family: ui-monospace, monospace; font-weight: 900; font-size: 1.1rem; color: #fff; margin-top: 2px; letter-spacing: 0.1em; opacity: 0.9; }

        /* スライダー調整 */
        .slider-container { width: 100%; padding: 0 40px; margin-top: 10px; pointer-events: none; }
        input[type=range] { -webkit-appearance: none; background: rgba(255,255,255,0.1); height: 4px; border-radius: 2px; width: 100%; pointer-events: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 26px; width: 26px; border-radius: 50%; border: 3px solid white; background: white; pointer-events: auto; cursor: pointer; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        
        .drag-handle { width: 40px; height: 100%; position: absolute; right: 0; top: 0; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.05); cursor: grab; z-index: 30; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; width: 100%; }

        .nav-tab { flex: 1; padding: 12px; font-weight: 900; font-size: 0.7rem; text-align: center; color: #475569; }
        .nav-tab.active { color: #f59e0b; background: rgba(245, 158, 11, 0.1); border-bottom: 2px solid #f59e0b; }
    </style>
</head>
<body>
    <div id="loading-overlay" class="fixed inset-0 flex items-center justify-center bg-slate-950 z-50">
        <div class="text-amber-500 font-bold animate-pulse uppercase tracking-[0.3em]">Master Collection</div>
    </div>

    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col relative hidden">
        <header class="bg-black/95 backdrop-blur-xl border-b border-amber-900/40 sticky top-0 z-50">
            <div class="px-6 py-3 flex justify-center items-center">
                <h1 class="text-lg italic gold-text uppercase tracking-[0.2em]">Whisky Stock</h1>
            </div>
            <nav class="flex">
                <div onclick="switchPage('shelf')" id="tab-shelf" class="nav-tab active">SHELF</div>
                <div onclick="switchPage('wish')" id="tab-wish" class="nav-tab">WISH</div>
                <div onclick="switchPage('archive')" id="tab-archive" class="nav-tab">ARCHIVE</div>
            </nav>
            <div id="sort-bar" class="flex items-center px-4 py-2 bg-slate-900/80 overflow-x-auto gap-2 no-scrollbar">
                <div class="flex gap-1.5 overflow-x-auto no-scrollbar">
                    <button onclick="setSort('sortOrder')" id="sort-sortOrder" class="sort-btn active">CUSTOM</button>
                    <button onclick="setSort('category')" id="sort-category" class="sort-btn">CAT</button>
                    <button onclick="setSort('flavor')" id="sort-flavor" class="sort-btn">FLV</button>
                    <button onclick="setSort('abv')" id="sort-abv" class="sort-btn">ABV</button>
                    <button onclick="setSort('remaining')" id="sort-remaining" class="sort-btn">STOCK</button>
                </div>
            </div>
        </header>

        <main id="whiskyList" class="flex-grow px-4 mt-4 pb-40"></main>

        <button id="addBtn" class="fixed bottom-6 right-6 w-14 h-14 bg-gradient-to-tr from-amber-900 to-amber-500 text-white rounded-full shadow-2xl flex items-center justify-center text-3xl z-30 active:scale-90 border-2 border-amber-200/40">＋</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAk41dGtCDcDGMmvXmknE6MIJAlVi3AmLQ",
            authDomain: "my-whisky-app.firebaseapp.com",
            projectId: "my-whisky-app",
            storageBucket: "my-whisky-app.firebasestorage.app",
            messagingSenderId: "577760896040",
            appId: "1:577760896040:web:a3e9839ffeaacb8c63c11d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const targetUID = "yE6g8Wf24sgKDat5wracCN2STTJ2"; 

        let items = [];
        let currentPage = 'shelf';
        let currentSort = 'sortOrder';

        const sortable = new Sortable(document.getElementById('whiskyList'), {
            handle: '.drag-handle',
            animation: 250,
            onEnd: async () => {
                if (currentSort !== 'sortOrder') return;
                const listEls = document.querySelectorAll('.whisky-card');
                const batch = writeBatch(db);
                listEls.forEach((el, idx) => {
                    const id = el.getAttribute('data-id');
                    batch.update(doc(db, "users", targetUID, "whiskies", id), { sortOrder: idx * 10 });
                });
                await batch.commit();
            }
        });

        onSnapshot(query(collection(db, "users", targetUID, "whiskies"), orderBy("sortOrder", "asc")), (snap) => {
            document.getElementById('loading-overlay').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            render();
        });

        const render = () => {
            const list = document.getElementById('whiskyList');
            let filtered = items.filter(w => {
                const stock = w.remaining ?? 100;
                if (currentPage === 'shelf') return stock > 0 && !w.isWish;
                if (currentPage === 'archive') return stock <= 0 && !w.isWish;
                return w.isWish === true;
            });

            list.innerHTML = filtered.map((w) => {
                const stock = w.remaining ?? 100;
                const catDisp = (w.category === 'Scotch' && w.region) ? `${w.category} / ${w.region}` : (w.category || 'Others');
                
                return `
                <div class="whisky-card p-4 cat-${w.category || 'Others'} ${currentPage === 'archive' ? 'filter grayscale opacity-40' : ''}" data-id="${w.id}">
                    <div class="flex flex-wrap justify-center gap-1.5 mb-2">
                        <span class="tag">${catDisp}</span>
                        <span class="tag">${w.abv || 40}%</span>
                    </div>
                    
                    <h3 class="font-black text-xl tracking-tight leading-tight line-clamp-2 px-2">
                        ${w.name}
                    </h3>

                    <div class="stock-display">${stock}%</div>
                    
                    <div class="flex justify-center mt-1">
                        <span class="flv-tag ${!w.flavor ? 'flv-empty' : ''}">${w.flavor || 'No Flavor'}</span>
                    </div>

                    <div class="slider-container">
                        <input type="range" min="0" max="100" step="5" value="${stock}" 
                            onchange="updateStock('${w.id}', this.value)" 
                            oninput="this.closest('.whisky-card').querySelector('.stock-display').innerText=this.value+'%'">
                    </div>

                    <div class="drag-handle" style="opacity: ${currentSort === 'sortOrder' ? '1' : '0'}">
                        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
                    </div>
                </div>`;
            }).join('');
        };

        window.updateStock = async (id, val) => { await updateDoc(doc(db, "users", targetUID, "whiskies", id), { remaining: parseInt(val) }); };
        window.switchPage = (p) => { currentPage = p; render(); };
        window.setSort = (k) => { currentSort = k; render(); };
    </script>
</body>
</html>
