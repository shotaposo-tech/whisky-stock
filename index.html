<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <link rel="apple-touch-icon" href="apple-touch-icon%202.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Whisky Stock Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; background-color: #0f172a; color: #f8fafc; overflow-x: hidden; }
        .gold-text { background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        .whisky-card { border-radius: 20px; border: 3px solid #4b5563; transition: all 0.3s; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); position: relative; overflow: hidden; background: #1e293b; margin-bottom: 16px; }
        .tag { font-size: 9px; padding: 2px 8px; border-radius: 99px; font-weight: 800; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); color: #fbbf24; }
        .sort-btn { font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 8px; background: #1e293b; border: 1px solid #334155; transition: 0.2s; white-space: nowrap; }
        .sort-btn.active { background: #f59e0b; color: #000; border-color: #f59e0b; }
        .nav-tab { flex: 1; padding: 14px; font-weight: 900; font-size: 0.7rem; text-align: center; color: #475569; }
        .nav-tab.active { color: #f59e0b; border-bottom: 2px solid #f59e0b; }
        .stock-display { position: absolute; top: 16px; right: 60px; font-family: ui-monospace, monospace; font-weight: 900; font-size: 1.5rem; color: white; }
    </style>
</head>
<body>
    <div id="loading-overlay" class="fixed inset-0 flex items-center justify-center bg-slate-900 z-50">
        <div class="text-amber-500 font-bold animate-pulse">CONNECTING...</div>
    </div>

    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col relative">
        <header class="bg-black/95 border-b border-amber-900/30 sticky top-0 z-50">
            <div class="px-6 py-4 text-center">
                <h1 class="text-xl italic gold-text uppercase tracking-widest">Whisky Stock</h1>
            </div>
            <nav class="flex">
                <div onclick="switchPage('shelf')" id="tab-shelf" class="nav-tab active">SHELF</div>
                <div onclick="switchPage('wish')" id="tab-wish" class="nav-tab">WISH</div>
                <div onclick="switchPage('archive')" id="tab-archive" class="nav-tab">ARCHIVE</div>
            </nav>
        </header>
        <main id="whiskyList" class="p-4 space-y-4 pb-40"></main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, doc, updateDoc, deleteDoc, addDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // 設定値をクリーンアップして適用
        const firebaseConfig = {
            apiKey: "AIzaSyAk41dGtCDcDGMmvXmknE6MIJAlVi3AmLQ".trim(),
            authDomain: "my-whisky-app.firebaseapp.com".trim(),
            projectId: "my-whisky-app".trim(),
            storageBucket: "my-whisky-app.firebasestorage.app".trim(),
            messagingSenderId: "577760896040".trim(),
            appId: "1:577760896040:web:a3e9839ffeaacb8c63c11d".trim()
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const targetUID = "yE6g8Wf24sgKDat5wracCN2STTJ2"; 

        let items = [];
        let currentPage = 'shelf';

        const q = query(collection(db, "users", targetUID, "whiskies"));
        
        onSnapshot(q, (snap) => {
            document.getElementById('loading-overlay').classList.add('hidden');
            items = snap.docs.map(d => {
                const data = d.data();
                const stock = data.remaining !== undefined ? data.remaining : (data.percent !== undefined ? data.percent : 100);
                return { id: d.id, ...data, displayStock: stock };
            });
            render();
        }, (err) => {
            alert("Firebase接続エラー: " + err.message);
        });

        window.switchPage = (page) => {
            currentPage = page;
            ['shelf', 'wish', 'archive'].forEach(p => document.getElementById(`tab-${p}`).classList.toggle('active', p === page));
            render();
        };

        const render = () => {
            const list = document.getElementById('whiskyList');
            let filtered = items.filter(w => {
                if (currentPage === 'shelf') return w.displayStock > 0 && !w.isWish;
                if (currentPage === 'wish') return w.isWish === true;
                if (currentPage === 'archive') return w.displayStock <= 0 && !w.isWish;
                return false;
            });

            filtered.sort((a, b) => a.name.localeCompare(b.name));

            list.innerHTML = filtered.map(w => `
                <div class="whisky-card p-5">
                    <div class="stock-display">${w.displayStock}%</div>
                    <h3 class="font-black text-xl mb-4">${w.name}</h3>
                    <input type="range" min="0" max="100" step="5" value="${w.displayStock}" class="w-full" onchange="updateStock('${w.id}', this.value)">
                </div>
            `).join('');
        };

        window.updateStock = async (id, val) => {
            await updateDoc(doc(db, "users", targetUID, "whiskies", id), { remaining: parseInt(val), percent: parseInt(val) });
        };
    </script>
</body>
</html>
