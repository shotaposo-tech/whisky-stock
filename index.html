<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <link rel="apple-touch-icon" href="apple-touch-icon%202.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Whisky Stock Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; background-color: #020617; color: #f8fafc; overflow-x: hidden; touch-action: pan-y; }
        .gold-text { background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        
        .whisky-card { border-radius: 24px; border: 4px solid rgba(255,255,255,0.2); box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.8); position: relative; overflow: hidden; margin-bottom: 1rem; background: #020617; }
        
        .sortable-ghost { opacity: 0; } 
        .sortable-drag { opacity: 1 !important; transform: scale(1.03); box-shadow: 0 40px 80px rgba(0,0,0,0.9); z-index: 1000; background: #1e293b !important; }

        .cat-Scotch { background: linear-gradient(145deg, rgba(37, 99, 235, 0.65), #020617); border-color: rgba(37, 99, 235, 0.9); }
        .cat-Japanese { background: linear-gradient(145deg, rgba(16, 185, 129, 0.6), #020617); border-color: rgba(16, 185, 129, 0.9); }
        .cat-Irish { background: linear-gradient(145deg, rgba(5, 150, 105, 0.65), #020617); border-color: rgba(5, 150, 105, 0.9); }
        .cat-American { background: linear-gradient(145deg, rgba(245, 158, 11, 0.65), #020617); border-color: rgba(245, 158, 11, 0.9); }
        .cat-Blended { background: linear-gradient(145deg, rgba(148, 163, 184, 0.55), #020617); border-color: rgba(148, 163, 184, 0.8); }
        .cat-Others { background: linear-gradient(145deg, rgba(51, 65, 85, 0.65), #020617); border-color: rgba(71, 85, 105, 0.9); }

        .tag { font-size: 9px; padding: 2px 8px; border-radius: 99px; font-weight: 800; background: rgba(0,0,0,0.8); border: 1.5px solid rgba(255,255,255,0.4); color: #fbbf24; white-space: nowrap; }
        
        .slider-container { width: calc(100% - 60px); margin-top: 14px; padding-bottom: 4px; }
        input[type=range] { -webkit-appearance: none; background: rgba(255,255,255,0.15); height: 6px; border-radius: 3px; width: 100%; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; border: 2px solid white; background: white; box-shadow: 0 0 15px rgba(0,0,0,0.6); margin-top: -1px; }
        
        .nav-tab { flex: 1; padding: 14px; font-weight: 900; font-size: 0.75rem; text-align: center; color: #475569; border-bottom: 3px solid transparent; }
        .nav-tab.active { color: #f59e0b; border-bottom-color: #f59e0b; background: rgba(245, 158, 11, 0.2); }
        
        /* ソートボタンのデザイン復活 */
        .sort-btn { font-size: 10px; font-weight: 800; padding: 6px 12px; border-radius: 10px; background: #1e293b; border: 1px solid #475569; color: #94a3b8; }
        .sort-btn.active { background: #f59e0b; color: #000; border-color: #f59e0b; }

        .stock-display { position: absolute; top: 20px; right: 60px; font-family: ui-monospace, monospace; font-weight: 900; font-size: 1.8rem; text-shadow: 0 4px 10px rgba(0,0,0,1); pointer-events: none; }
        .drag-handle { width: 44px; height: 100%; position: absolute; right: 0; top: 0; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.3); cursor: grab; z-index: 30; }

        #modal { display: none; }
        #modal.active { display: flex; z-index: 100; }
    </style>
</head>
<body>
    <div id="loading-overlay" class="fixed inset-0 flex items-center justify-center bg-slate-950 z-50">
        <div class="text-amber-500 font-bold animate-pulse uppercase tracking-[0.3em]">Master Collection</div>
    </div>

    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col relative hidden">
        <header class="bg-black/95 backdrop-blur-xl border-b border-amber-900/40 sticky top-0 z-50">
            <div class="px-6 py-4 flex justify-center items-center">
                <h1 class="text-xl italic gold-text uppercase tracking-[0.2em]">Whisky Stock</h1>
            </div>
            <nav class="flex">
                <div onclick="switchPage('shelf')" id="tab-shelf" class="nav-tab active">SHELF</div>
                <div onclick="switchPage('wish')" id="tab-wish" class="nav-tab">WISH LIST</div>
                <div onclick="switchPage('archive')" id="tab-archive" class="nav-tab">ARCHIVE</div>
            </nav>
            <div id="sort-bar" class="flex justify-between items-center px-4 py-2 bg-slate-900/80 overflow-x-auto gap-2">
                <span class="text-[9px] font-bold text-slate-500 uppercase shrink-0">Sort:</span>
                <div class="flex gap-1.5">
                    <button onclick="setSort('sortOrder')" id="sort-sortOrder" class="sort-btn active">CUSTOM</button>
                    <button onclick="setSort('category')" id="sort-category" class="sort-btn">CAT</button>
                    <button onclick="setSort('abv')" id="sort-abv" class="sort-btn">ABV</button>
                    <button onclick="setSort('remaining')" id="sort-remaining" class="sort-btn">STOCK</button>
                </div>
            </div>
        </header>

        <main id="whiskyList" class="flex-grow px-4 mt-4 pb-40"></main>

        <div id="modal" class="fixed inset-0 bg-black/95 items-center justify-center p-6 backdrop-blur-md">
            <div class="bg-slate-900 w-full max-w-sm rounded-[32px] p-8 border border-white/20 shadow-2xl">
                <span id="editTargetName" class="text-white font-black mb-6 block text-lg border-l-4 border-amber-500 pl-3 leading-tight">---</span>
                <div id="modalOptions" class="grid grid-cols-2 gap-3"></div>
                <button onclick="closeModal()" class="mt-8 w-full text-slate-400 font-bold py-2">CANCEL</button>
            </div>
        </div>

        <button id="addBtn" class="fixed bottom-8 right-6 w-16 h-16 bg-gradient-to-tr from-amber-900 to-amber-500 text-white rounded-full shadow-2xl flex items-center justify-center text-4xl z-30 active:scale-90 border-2 border-amber-200/40">＋</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAk41dGtCDcDGMmvXmknE6MIJAlVi3AmLQ",
            authDomain: "my-whisky-app.firebaseapp.com",
            projectId: "my-whisky-app",
            storageBucket: "my-whisky-app.firebasestorage.app",
            messagingSenderId: "577760896040",
            appId: "1:577760896040:web:a3e9839ffeaacb8c63c11d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const targetUID = "yE6g8Wf24sgKDat5wracCN2STTJ2"; 

        let items = [];
        let currentPage = 'shelf';
        let currentSort = 'sortOrder';
        let lastTap = 0;
        let tapTimer = null;

        const sortable = new Sortable(document.getElementById('whiskyList'), {
            handle: '.drag-handle',
            animation: 250,
            ghostClass: 'sortable-ghost',
            dragClass: 'sortable-drag',
            forceFallback: true,
            onMove: () => currentSort === 'sortOrder', // CUSTOM以外の時はドラッグを制限
            onEnd: async () => {
                if (currentSort !== 'sortOrder') return;
                const listEls = document.querySelectorAll('.whisky-card');
                const batch = writeBatch(db);
                listEls.forEach((el, idx) => {
                    const id = el.getAttribute('data-id');
                    batch.update(doc(db, "users", targetUID, "whiskies", id), { sortOrder: idx * 10 });
                });
                await batch.commit();
            }
        });

        onSnapshot(query(collection(db, "users", targetUID, "whiskies"), orderBy("sortOrder", "asc")), (snap) => {
            document.getElementById('loading-overlay').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            render();
        });

        window.switchPage = (page) => {
            currentPage = page;
            ['shelf', 'wish', 'archive'].forEach(p => document.getElementById(`tab-${p}`).classList.toggle('active', p === page));
            render();
        };

        window.setSort = (key) => {
            currentSort = key;
            ['sortOrder', 'category', 'abv', 'remaining'].forEach(k => {
                const el = document.getElementById('sort-' + k);
                if(el) el.classList.toggle('active', k === key);
            });
            render();
        };

        const render = () => {
            const list = document.getElementById('whiskyList');
            let filtered = items.filter(w => {
                const stock = w.remaining ?? w.percent ?? 100;
                if (currentPage === 'shelf') return stock > 0 && !w.isWish;
                if (currentPage === 'archive') return stock <= 0 && !w.isWish;
                return w.isWish === true;
            });

            // ソート処理
            filtered.sort((a, b) => {
                if (currentSort === 'sortOrder') return a.sortOrder - b.sortOrder;
                if (currentSort === 'abv') return (b.abv || 0) - (a.abv || 0);
                if (currentSort === 'remaining') {
                    const stockA = a.remaining ?? a.percent ?? 100;
                    const stockB = b.remaining ?? b.percent ?? 100;
                    return stockA - stockB;
                }
                if (currentSort === 'category') return (a.category || "").localeCompare(b.category || "");
                return 0;
            });

            list.innerHTML = filtered.map((w) => {
                const stock = w.remaining ?? w.percent ?? 100;
                const catDisp = (w.category === 'Scotch' && w.region) ? `${w.category} / ${w.region}` : (w.category || 'Others');
                
                return `
                <div class="whisky-card p-6 cat-${w.category || 'Others'} ${currentPage === 'archive' ? 'filter grayscale opacity-40' : ''}" data-id="${w.id}">
                    <div class="stock-display">${stock}%</div>
                    <div class="pr-12">
                        <div class="flex flex-nowrap items-center gap-1.5 mb-2 overflow-x-hidden">
                            <span class="tag" onclick="openCatEdit('${w.id}', '${w.name.replace(/'/g, "\\'")}')">${catDisp} ✎</span>
                            <span class="tag" onclick="editAbv('${w.id}', '${w.name.replace(/'/g, "\\'")}', '${w.abv || 40}')">${w.abv || 40}% ✎</span>
                        </div>
                        <div>
                            <h3 class="font-black text-xl tracking-tighter leading-tight break-all" 
                                style="display:inline-block; position:relative; z-index:40; padding-right:10px;"
                                onclick="handleTap(event, '${w.id}', '${w.name.replace(/'/g, "\\'")}')">
                                ${w.name}
                            </h3>
                        </div>
                    </div>
                    ${w.isWish ? `
                        <button onclick="moveToShelf('${w.id}')" class="mt-4 w-full bg-amber-500 text-black font-black py-3 rounded-xl text-xs">GET & ADD TO SHELF</button>
                    ` : `
                        <div class="slider-container">
                            <input type="range" min="0" max="100" step="5" value="${stock}" onchange="updateStock('${w.id}', this.value)" oninput="this.closest('.whisky-card').querySelector('.stock-display').innerText=this.value+'%'">
                        </div>
                    `}
                    <div class="drag-handle" style="opacity: ${currentSort === 'sortOrder' ? '1' : '0.2'}">
                        <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
                    </div>
                </div>`;
            }).join('');
        };

        window.handleTap = (e, id, name) => {
            const now = Date.now();
            if (now - lastTap < 300) {
                clearTimeout(tapTimer);
                if(confirm(`「${name}」を削除しますか？`)) {
                    deleteDoc(doc(db, "users", targetUID, "whiskies", id));
                }
            } else {
                tapTimer = setTimeout(() => {
                    editName(id, name);
                }, 300);
            }
            lastTap = now;
        };

        window.updateStock = async (id, val) => { await updateDoc(doc(db, "users", targetUID, "whiskies", id), { remaining: parseInt(val), percent: parseInt(val) }); };
        window.editName = async (id, old) => { const n = prompt("銘柄名を変更", old); if (n && n !== old) await updateDoc(doc(db, "users", targetUID, "whiskies", id), { name: n }); };
        window.editAbv = async (id, name, old) => { const n = prompt(`"${name}" の度数(%)`, old); if (n !== null) await updateDoc(doc(db, "users", targetUID, "whiskies", id), { abv: parseFloat(n) || 40 }); };
        window.moveToShelf = async (id) => { await updateDoc(doc(db, "users", targetUID, "whiskies", id), { isWish: false, remaining: 100, percent: 100 }); switchPage('shelf'); };

        const categories = ["Scotch", "Japanese", "Irish", "American", "Blended", "Others"];
        const scotchRegions = ["Speyside", "Highland", "Lowland", "Islay", "Campbeltown", "Islands"];
        let tempName = "", editTargetId = null;

        document.getElementById('addBtn').onclick = () => {
            const n = prompt(currentPage === 'wish' ? "WISH銘柄を入力" : "新しい銘柄名を入力");
            if (n) { tempName = n; editTargetId = null; document.getElementById('editTargetName').innerText = n; openModal(categories); }
        };

        window.openCatEdit = (id, name) => { editTargetId = id; document.getElementById('editTargetName').innerText = name; openModal(categories); };
        const openModal = (opts, isReg = false) => {
            document.getElementById('modal').classList.add('active');
            document.getElementById('modalOptions').innerHTML = opts.map(o => `<button onclick="${isReg ? `selectReg('${o}')` : `selectCat('${o}')`}" class="p-4 rounded-xl font-bold text-white border border-white/10 bg-slate-800 shadow-lg">${o}</button>`).join('');
        };
        window.selectCat = (c) => c === "Scotch" ? openModal(scotchRegions, true) : finalize(c, "");
        window.selectReg = (r) => finalize("Scotch", r);
        const finalize = async (c, r) => {
            if (editTargetId) { await updateDoc(doc(db, "users", targetUID, "whiskies", editTargetId), { category: c, region: r });
            } else { await addDoc(collection(db, "users", targetUID, "whiskies"), { name: tempName, category: c, region: r, abv: 40, remaining: 100, isWish: (currentPage === 'wish'), sortOrder: items.length * 10 }); }
            closeModal();
        };
        window.closeModal = () => document.getElementById('modal').classList.remove('active');
    </script>
</body>
</html>
