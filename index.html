<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Whisky Stock Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { background:#020617; color:white; font-family:-apple-system; }
.gold-text { background:linear-gradient(to right,#bf953f,#fcf6ba,#b38728); -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-weight:900;}
.login-btn { background:#f59e0b; padding:12px 20px; border-radius:12px; font-weight:bold; }
</style>
</head>

<body>

<!-- ログイン画面 -->
<div id="login-screen" class="flex flex-col items-center justify-center h-screen">
    <h1 class="gold-text text-2xl mb-6">Whisky Stock</h1>
    <button onclick="login()" class="login-btn">Googleでログイン</button>
</div>

<!-- アプリ本体 -->
<div id="app" class="hidden max-w-md mx-auto p-4">
    <h2 class="text-lg mb-4">My Collection</h2>
    <div id="list"></div>
    <button onclick="addItem()" class="mt-6 bg-amber-500 px-4 py-2 rounded">追加</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { 
  getFirestore, collection, addDoc, onSnapshot 
} from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
import { 
  getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

/* 🔑 自分のFirebase設定に置き換えOK */
const firebaseConfig = {
  apiKey: "AIzaSyAk41dGtCDcDGMmvXmknE6MIJAlVi3AmLQ",
  authDomain: "my-whisky-app.firebaseapp.com",
  projectId: "my-whisky-app",
  storageBucket: "my-whisky-app.firebasestorage.app",
  messagingSenderId: "577760896040",
  appId: "1:577760896040:web:a3e9839ffeaacb8c63c11d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth();

const provider = new GoogleAuthProvider();

/* 🔐 ログイン */
window.login = async () => {
  try {
    await signInWithPopup(auth, provider);
  } catch(e) {
    alert("ログイン失敗: " + e.message);
  }
};

/* 👀 ログイン状態監視 */
onAuthStateChanged(auth, (user) => {
  if (user) {
    startApp(user);
  } else {
    document.getElementById("login-screen").classList.remove("hidden");
    document.getElementById("app").classList.add("hidden");
  }
});

/* 🚀 アプリ起動 */
function startApp(user) {
  const uid = user.uid;

  document.getElementById("login-screen").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  const list = document.getElementById("list");

  onSnapshot(collection(db, "users", uid, "whiskies"), (snap) => {
    list.innerHTML = snap.docs.map(d => {
      const data = d.data();
      return `<div class="p-3 mb-2 bg-slate-800 rounded">
        ${data.name || "No Name"}
      </div>`;
    }).join("");
  });

  /* 追加ボタン */
  window.addItem = async () => {
    const name = prompt("銘柄名");
    if (!name) return;

    await addDoc(collection(db, "users", uid, "whiskies"), {
      name: name,
      createdAt: new Date()
    });
  };
}
</script>

</body>
</html>
